<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etsy Listing Optimizer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff7f2, #ffe8dc);
      color: #2d2d2d;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 22px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .hero {
      background: linear-gradient(135deg, #f1641e, #ff8c5a);
      color: white;
      padding: 32px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    .hero p {
      margin: 0;
      opacity: 0.95;
      line-height: 1.5;
    }

    .content {
      padding: 28px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 16px;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: #f1641e;
      box-shadow: 0 0 0 4px rgba(241, 100, 30, 0.12);
    }

    .button-row {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      background: #f1641e;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 0.98rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
    }

    button:hover {
      background: #d95212;
      transform: translateY(-1px);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .copy-btn {
      background: #fff;
      color: #c94f16;
      border: 1px solid #ffd7c5;
      padding: 10px 14px;
      font-size: 0.9rem;
    }

    .copy-btn:hover {
      background: #fff6f1;
    }

    .status {
      font-size: 0.95rem;
      color: #666;
    }

    .results {
      margin-top: 28px;
      display: none;
    }

    .results.show {
      display: block;
    }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .card {
      background: #fffaf7;
      border: 1px solid #ffe1d3;
      border-radius: 16px;
      padding: 18px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .card h2 {
      margin: 0;
      font-size: 1.08rem;
      color: #c94f16;
    }

    .output-text {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 0.98rem;
      color: #333;
    }

    .tags-box {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag-pill {
      background: white;
      border: 1px solid #ffd7c5;
      color: #9a3f14;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.92rem;
    }

    .footer-note {
      margin-top: 14px;
      text-align: center;
      color: #777;
      font-size: 0.85rem;
    }

    @media (max-width: 640px) {
      .hero h1 {
        font-size: 1.5rem;
      }

      .content {
        padding: 20px;
      }

      button {
        width: 100%;
      }

      .copy-btn {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Etsy Listing Optimizer</h1>
      <p>Turn rough product descriptions into better Etsy titles, tags, and descriptions that are easier to use right away.</p>
    </div>

    <div class="content">
      <label for="input">Paste your product description</label>
      <textarea
        id="input"
        placeholder="Paste your Etsy product description here (e.g., handmade lavender soy candle, 8oz, gift for mom, home decor)"
      ></textarea>

      <div class="button-row">
        <button id="generateBtn" onclick="generate()">Generate Listing</button>
        <span class="status" id="status"></span>
      </div>

      <div class="results" id="results">
        <div class="results-grid">
          <div class="card">
            <div class="card-header">
              <h2>Optimized Title</h2>
              <button class="copy-btn" onclick="copyText('titleOutput')">Copy Title</button>
            </div>
            <div class="output-text" id="titleOutput"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <h2>Etsy Tags</h2>
              <button class="copy-btn" onclick="copyTags()">Copy Tags</button>
            </div>
            <div class="tags-box" id="tagsOutput"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <h2>Optimized Description</h2>
              <button class="copy-btn" onclick="copyText('descriptionOutput')">Copy Description</button>
            </div>
            <div class="output-text" id="descriptionOutput"></div>
          </div>
        </div>
      </div>

      <div class="footer-note">
        Optimize your Etsy listings in seconds.
      </div>
    </div>
  </div>

  <script>
    function parseResult(result) {
      const titleMatch = result.match(/TITLE:\s*([\s\S]*?)\s*TAGS:/i);
      const tagsMatch = result.match(/TAGS:\s*([\s\S]*?)\s*DESCRIPTION:/i);
      const descriptionMatch = result.match(/DESCRIPTION:\s*([\s\S]*)/i);

      const title = titleMatch ? titleMatch[1].trim() : "";
      const rawTags = tagsMatch ? tagsMatch[1].trim() : "";
      const description = descriptionMatch ? descriptionMatch[1].trim() : "";

      const tags = rawTags
        .split("\n")
        .map(tag => tag.trim())
        .map(tag => tag.replace(/^\d+\.\s*/, ""))
        .map(tag => tag.replace(/^-\s*/, ""))
        .filter(tag => tag.length > 0);

      return { title, tags, description };
    }

    function renderTags(tags) {
      const tagsOutput = document.getElementById("tagsOutput");
      tagsOutput.innerHTML = "";

      tags.forEach(tag => {
        const pill = document.createElement("div");
        pill.className = "tag-pill";
        pill.textContent = tag;
        tagsOutput.appendChild(pill);
      });
    }

    async function copyText(elementId) {
      const text = document.getElementById(elementId).textContent.trim();
      if (!text) return;
      await navigator.clipboard.writeText(text);
    }

    async function copyTags() {
      const tags = Array.from(document.querySelectorAll(".tag-pill"))
        .map(el => el.textContent.trim())
        .filter(Boolean);

      if (!tags.length) return;

      await navigator.clipboard.writeText(tags.join("\n"));
    }

    async function generate() {
      const text = document.getElementById("input").value.trim();
      const status = document.getElementById("status");
      const button = document.getElementById("generateBtn");
      const results = document.getElementById("results");

      const titleOutput = document.getElementById("titleOutput");
      const descriptionOutput = document.getElementById("descriptionOutput");
      const tagsOutput = document.getElementById("tagsOutput");

      if (!text) {
        status.textContent = "Please enter a product description first.";
        return;
      }

      status.textContent = "Generating...";
      button.disabled = true;
      results.classList.remove("show");
      titleOutput.textContent = "";
      descriptionOutput.textContent = "";
      tagsOutput.innerHTML = "";

      try {
        const res = await fetch("https://etsy-ai-backend-isei.onrender.com/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ description: text })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Something went wrong.");
        }

        const parsed = parseResult(data.result);

        titleOutput.textContent = parsed.title || "No title returned.";
        descriptionOutput.textContent = parsed.description || "No description returned.";
        renderTags(parsed.tags);

        results.classList.add("show");
        status.textContent = "Done.";
      } catch (err) {
        status.textContent = "Error: " + err.message;
      } finally {
        button.disabled = false;
      }
    }
  </script>
</body>
</html>
